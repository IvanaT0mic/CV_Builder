services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cvbuilder-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cvbuilder-web
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
