server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip for Blazor's large WASM files
    gzip on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/wasm
        application/octet-stream
        application/json;

    # Serve Blazor's pre-compressed .gz files if available
    location ~* \.(js|wasm)$ {
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Blazor client-side routing: fall back to index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
